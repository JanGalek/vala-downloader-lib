name: Bug report
description: Report a reproducible problem in vala-downloader-lib
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.
        Please include enough detail so we can reproduce it.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Download fails with status 200 on local server
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide exact commands or code snippets
      placeholder: |
        1. Configure manager with...
        2. Run download...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Vala version, libsoup version
      placeholder: Fedora 42, valac 0.56.x, libsoup 3.6.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
